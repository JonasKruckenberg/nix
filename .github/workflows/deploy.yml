name: Deploy ardmore

permissions:
  id-token: write # This is required for the Tailscale action to request a JWT from GitHub

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install Nix with flakes enabled on the ephemeral runner
      - uses: DeterminateSystems/nix-installer-action@v14

      # # Preflight: evaluate all flake outputs without building.
      # # Catches Nix expression errors (bad imports, type errors, etc.)
      # # before we touch the machine. Runs on x86_64 — the aarch64
      # # build itself happens on ardmore via --build-host below.
      # - name: Preflight — nix flake check
      #   run: nix flake check --no-build

      # Authentication is handled by Tailscale identity — no SSH key needed.
      # Using ~/.ssh/config rather than NIX_SSHOPTS avoids a known bug
      # where NIX_SSHOPTS is not forwarded to internal nix-build SSH calls.
      - name: Configure SSH
        run: |
          install -dm 700 ~/.ssh
          {
            echo 'Host ardmore'
            echo '  User deploy'
            echo '  StrictHostKeyChecking yes'
            echo '  ServerAliveInterval 30'
            echo '  ServerAliveCountMax 5'
          } >> ~/.ssh/config

      # Ephemeral Tailscale node for this job.
      # Requires a Tailscale OAuth client with the writable auth_keys scope,
      # owned by tag:ci. The tailnet ACL must grant tag:ci SSH access to
      # ardmore as the deploy user:
      #   "ssh": [{"action":"accept","src":["tag:ci"],"dst":["tag:server"],"users":["deploy"]}]
      # ping: blocks until ardmore is reachable before continuing.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci

      - name: manual status
        run: tailscale status

      - name: manual ping
        run: |
          tailscale ping --tsmp ardmore.tailf383a6.ts.net
          tailscale ping --icmp ardmore.tailf383a6.ts.net

      # Populate known_hosts by scanning ardmore inside the WireGuard tunnel.
      # This is MITM-safe: MagicDNS resolves 'ardmore' via Tailscale's
      # coordination server, which cryptographically binds the name to
      # ardmore's Tailscale identity. No stored secret needed.
      - name: Populate known_hosts
        run: ssh-keyscan -t ed25519 ardmore.tailf383a6.ts.net >> ~/.ssh/known_hosts

      # nixos-rebuild is a NixOS-only script, not available on this Ubuntu runner.
      # We pull it from the same nixpkgs commit pinned in flake.lock via
      # --inputs-from so the orchestration script is version-consistent with
      # the system being deployed.
      # Build and activation both happen on ardmore (aarch64) via --build-host
      # and --target-host; the runner only evaluates the flake and orchestrates.
      - name: Deploy
        run: |
          nix shell --inputs-from . nixpkgs#nixos-rebuild \
            --command nixos-rebuild switch \
            --flake .#ardmore \
            --build-host deploy@ardmore.tailf383a6.ts.net \
            --target-host deploy@ardmore.tailf383a6.ts.net \
            --use-remote-sudo
